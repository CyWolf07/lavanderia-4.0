services:
  - type: web
    name: lavanderia-web
    runtime: docker
    repo: https://github.com/CyWolf07/lavanderia-4.0.git
    branch: main
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: APP_NAME
        value: Lavanderia Registro
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_LOCALE
        value: es
      - key: APP_FALLBACK_LOCALE
        value: es
      - key: APP_FAKER_LOCALE
        value: es_CO
      - key: APP_MAINTENANCE_DRIVER
        value: cache
      - key: APP_MAINTENANCE_STORE
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: lavanderia-db
          property: connectionString
      - key: DB_SCHEMA
        value: public
      - key: DB_SSLMODE
        value: prefer
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log
      - key: VIEW_COMPILED_PATH
        value: storage/framework/views-runtime
      - key: TRUSTED_PROXIES
        value: "*"

databases:
  - name: lavanderia-db
    plan: basic-256mb
    region: oregon
    databaseName: lavanderia
